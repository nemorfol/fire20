<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#1e3a8a" />
		<!-- Meta SEO statici di default (presenti anche senza JS): servono agli
		     unfurler social (Facebook/WhatsApp/LinkedIn/X) e ai crawler che non
		     eseguono JS. Il <title> per-pagina e' poi raffinato nel layout. -->
		<title>FIRE Planner — Indipendenza finanziaria con fiscalità italiana</title>
		<meta
			name="description"
			content="Pianificatore FIRE gratuito e privato, calibrato sulla fiscalità e previdenza italiana (IRPEF, INPS, TFR, fondo pensione). Tutti i calcoli nel browser, nessun dato inviato a server."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="FIRE Planner" />
		<meta property="og:title" content="FIRE Planner — Indipendenza finanziaria con fiscalità italiana" />
		<meta
			property="og:description"
			content="Pianificatore FIRE gratuito e privato per il contesto fiscale e previdenziale italiano. Tutti i calcoli nel browser, nessun dato inviato a server esterni."
		/>
		<meta property="og:image" content="https://fire20.vercel.app/pwa-512x512.png" />
		<meta property="og:url" content="https://fire20.vercel.app/" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="FIRE Planner — Indipendenza finanziaria con fiscalità italiana" />
		<meta
			name="twitter:description"
			content="Pianificatore FIRE gratuito e privato per il contesto fiscale e previdenziale italiano."
		/>
		<meta name="twitter:image" content="https://fire20.vercel.app/pwa-512x512.png" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/pwa-192x192.png" />
		<script>
			// Tema iniziale: preferenza salvata, altrimenti prefers-color-scheme del
			// sistema. Eseguito prima del CSS per evitare flash. Il toggle in-app
			// continua a gestire la classe 'dark' e localStorage (THEME_PREFERENCE_KEY).
			try {
				const t = localStorage.getItem('THEME_PREFERENCE_KEY');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
