<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#1e3a8a" />
		<meta name="description" content="Pianificatore FIRE per l'indipendenza finanziaria - Contesto fiscale italiano" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/pwa-192x192.png" />
		<script>
			// Tema iniziale: preferenza salvata, altrimenti prefers-color-scheme del
			// sistema. Eseguito prima del CSS per evitare flash. Il toggle in-app
			// continua a gestire la classe 'dark' e localStorage 'color-theme'.
			try {
				const t = localStorage.getItem('color-theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
